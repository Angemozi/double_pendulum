# Stabilize task: start near inverted, learn to hold balance. Domain
# randomization + disturbances are enabled to encourage a robust controller.
physics.integrator: RK4
physics.maxTorque: 8.0

env.actuator: Dual
env.task: Stabilize
env.maxEpisodeSteps: 2000
env.wUpright: 1.0
env.wTorque: 0.2            # was 0.05: aggressive motor action is now expensive
env.wOmega: 0.1            # was 0.02: STRONG penalty on (w1^2 + w2^2)
env.wSurvival: 0.0          # no unconditional alive bonus to farm
env.stillnessSharpness: 0.0 # gate REMOVED -> replaced by the direct quadratic below
env.omegaRefSpeed: 0        # 0 => the omega penalty is the RAW, UNBOUNDED quadratic
                            #   -wOmega*(w1^2+w2^2): high-speed spinning -> deep negative
                            #   (a strictly-negative spin reward, not just neutral)
env.domainRandomize: true
# Disturbances OFF for the "stand perfectly still" goal: random kicks force
# recovery motion that breaks stillness and the success streak. Train robustness
# to kicks with configs/recovery.yaml instead.
env.disturbances: false
env.disturbProb: 0.002
env.disturbMagnitude: 2.0
# One-time "perfect static equilibrium" success detector (dp_simulator). At the
# 240 Hz sim rate, 480 steps = 2 s. Tighten tolerances for a stricter monk.
env.staticAngleTol: 0.10
env.staticVelTol: 0.30
env.staticHoldSteps: 480

ppo.hidden1: 64
ppo.hidden2: 64
ppo.entropyCoef: 0.01        # was 0.003: stronger exploration pressure
ppo.minLogStd: -1.0          # was -2.0: initial std ~1.0 AND a 0.37 floor, so the
                             #   policy can't collapse onto the spinning local minimum
ppo.targetEntropyPerDim: 0.8 # was 0.4: hold entropy high, resist premature collapse
ppo.rolloutSteps: 2048

train.seed: 42
train.totalSteps: 300000000
train.runName: ppo_stabilize
